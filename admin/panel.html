<!DOCTYPE html>
<html lang="si">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard | Social Map</title>
  <style>
    body { font-family: sans-serif; background: #f4f6f8; margin: 0; padding: 0; }
    .header { background: #d32f2f; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center;}
    .container { display: flex; flex-wrap: wrap; padding: 20px; gap: 20px; }
    .card { background: white; padding: 20px; border-radius: 10px; flex: 1; min-width: 350px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px;}
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;}
    input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-family: inherit;}
    label { font-weight: bold; font-size: 13px; display: block; margin-bottom: 5px; color: #555;}
    .btn-save { background: #2e7d32; color: white; padding: 15px; border: none; border-radius: 5px; width: 100%; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px;}
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { padding: 10px; border-bottom: 1px solid #ddd; text-align: left;}
    .btn-edit { background: #1976d2; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold;}
    .product-row { background: #f9f9f9; padding: 10px; border-radius: 5px; margin-bottom: 10px; border-left: 5px solid #d32f2f; }
  </style>
</head>
<body>
  <div class="header">
    <h2 style="margin:0;">🔴 ADMIN DASHBOARD</h2>
    <button onclick="sessionStorage.clear(); window.location.href='index.html'" style="padding:8px 15px; cursor:pointer;">Logout</button>
  </div>
  
  <div class="container">
    <div class="card">
      <h3 style="margin-top:0;">Customer Setup</h3>
      <div id="msg" style="display:none; padding:10px; margin-bottom:10px; font-weight:bold; border-radius:5px;"></div>
      <div class="grid-2">
        <div><label>Shop ID</label><input type="text" id="c_id"></div>
        <div><label>Type</label><select id="c_type"><option value="profile">Profile</option><option value="redirect">Redirect</option></select></div>
      </div>
      <div><label>Business Name</label><input type="text" id="c_name"></div>
      <div class="grid-2" style="margin-top:15px;">
        <div><label>WhatsApp</label><input type="text" id="c_wa"></div><div><label>Maps</label><input type="text" id="c_maps"></div>
        <div><label>Facebook</label><input type="text" id="c_fb"></div><div><label>Instagram</label><input type="text" id="c_ig"></div>
      </div>
      <button class="btn-save" onclick="saveData()">Save / Update Customer</button>
    </div>

    <div class="card" style="flex: 1.5;">
      <h3 style="margin-top:0;">Customer List</h3>
      <table>
        <thead><tr><th>ID</th><th>Name</th><th>Action</th></tr></thead>
        <tbody id="tableBody"><tr><td colspan="3">Loading...</td></tr></tbody>
      </table>
    </div>

    <div class="card" style="flex: 100%;">
      <h3 style="margin-top:0; color:#d32f2f;">📦 Product & Price Manager</h3>
      <div class="grid-2" style="max-width: 500px;">
        <div>
          <label>Manage Shop ID</label>
          <input type="text" id="p_shop_id" placeholder="Shop ID එක ගහන්න (උදා: 102)">
        </div>
        <div style="display:flex; align-items:flex-end;">
          <button class="btn-save" style="margin:0; background:#555;" onclick="adminFetchProducts()">Load Products</button>
        </div>
      </div>
      <div id="adminProductMsg" style="margin-top:10px; font-weight:bold;"></div>
      <hr style="margin:20px 0; border:0; border-top:1px solid #eee;">
      <div id="adminProductsList">Shop ID එක ගසා Load බොත්තම ඔබන්න.</div>
    </div>
  </div>

  <script>
    // 👇 ඔයාගේ Web App URL එක මෙතනට දාන්න 👇
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzUNv3bLJX2yfMmxfoWtDyETRQ3r0yLkC5eSA9kI4DTccE-UXV471luYE7_ZXB9sLfy/exec";

    function loadCustomers() {
      fetch(`${APPS_SCRIPT_URL}?action=getAll`).then(res => res.json()).then(data => {
        let tbody = document.getElementById('tableBody'); tbody.innerHTML = "";
        data.data.forEach(c => {
          tbody.innerHTML += `<tr><td>${c.ID}</td><td>${c.BusinessName}</td><td><button class="btn-edit" onclick="setShopId('${c.ID}')">Select</button></td></tr>`;
        });
      });
    }

    function setShopId(id) {
      document.getElementById('p_shop_id').value = id;
      adminFetchProducts();
    }

    function saveData() {
      // මෙතැනට කලින් saveData කෝඩ් එකම එනවා
    }

    // --- 📦 ADMIN PRODUCT MANAGEMENT ---
    function adminFetchProducts() {
      const shopId = document.getElementById('p_shop_id').value;
      if(!shopId) { alert("කරුණාකර Shop ID එක ඇතුළත් කරන්න."); return; }
      
      const listDiv = document.getElementById('adminProductsList');
      listDiv.innerHTML = "Loading...";

      fetch(`${APPS_SCRIPT_URL}?action=getProducts&shopId=${shopId}`)
        .then(res => res.json()).then(data => {
          listDiv.innerHTML = "";
          if(data.success && data.data.length > 0) {
            data.data.forEach(p => {
              listDiv.innerHTML += `
                <div class="product-row">
                  <div class="grid-2">
                    <div><strong>${p.ProductName}</strong> (ID: ${p.ProductID})</div>
                    <div style="display:flex; gap:10px;">
                      <input type="number" id="admin_p_${p.ProductID}" value="${p.Price}" style="padding:5px;">
                      <button class="btn-edit" style="background:#2e7d32;" onclick="adminUpdatePrice('${p.ProductID}')">Update Price</button>
                    </div>
                  </div>
                </div>`;
            });
          } else {
            listDiv.innerHTML = "මෙම Shop ID එකට අදාළ භාණ්ඩ කිසිවක් 'Products' sheet එකේ හමුවුණේ නැත.";
          }
        });
    }

    function adminUpdatePrice(productId) {
      const shopId = document.getElementById('p_shop_id').value;
      const newPrice = document.getElementById('admin_p_' + productId).value;
      const msg = document.getElementById('adminProductMsg');
      
      msg.innerText = "Updating..."; msg.style.color = "blue";

      fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'updatePrice', shopId: shopId, productId: productId, price: newPrice }) })
      .then(res => res.json()).then(data => {
        if(data.success) { msg.innerText = "සාර්ථකව යාවත්කාලීන කළා!"; msg.style.color = "green"; }
        else { msg.innerText = "වැරදීමක් වුණා!"; msg.style.color = "red"; }
      });
    }

    window.onload = loadCustomers;
  </script>
</body>
</html>
